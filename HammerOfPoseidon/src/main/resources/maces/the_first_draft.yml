# ============================================================
#         The First Draft — Architect's Soulbound Mace
# ============================================================

holder: "YourNameHere"

display-name: "ᴛʜᴇ ꜰɪʀꜱᴛ ᴅʀᴀꜰᴛ"

gradient-start: "#4A5568"
gradient-end: "#CBD5E0"

enchantments:
  DENSITY: 5
  BREACH: 4
  WIND_BURST: 3

abilities:
  silent_read:
    far-range: 20.0
    near-range: 8.0
    ping-interval-ticks: 200

  calculated:
    max-fracture-stacks: 3
    missing-health-percent: 40

  contingency:
    cooldown: 120
    window-seconds: 15
    charges: 2
    partial-refund-seconds: 60
    teleport-distance: 6.0
    blindness-duration: 60
    slowness-duration: 100
    absorption-duration: 160
    execution-window-seconds: 5

  predetermined:
    cooldown: 45
    radius: 5.0
    duration-seconds: 12
    speed-duration: 80

  ground_slam:
    enabled: true
    # Minimum fall distance in blocks to trigger
    min-fall-distance: 3.0

  infinity_slots:
    enabled: true
    slots: 3
    # Reach values per spear tier (in blocks added)
    spear-reach:
      WOODEN_SPEAR: 1.0
      STONE_SPEAR: 1.8
      COPPER_SPEAR: 2.2
      IRON_SPEAR: 2.7
      GOLDEN_SPEAR: 3.0
      DIAMOND_SPEAR: 3.4
      NETHERITE_SPEAR: 4.0
    # Charged Smash (netherite spear only)
    charged-smash-interval-seconds: 60
    # Nether star augment
    nether-star-predetermined-radius-bonus: 3.0
    nether-star-nausea-duration-bonus: 40
