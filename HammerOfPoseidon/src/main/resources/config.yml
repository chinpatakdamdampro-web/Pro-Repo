# ==============================
#       HammerMaces Config
#   Global settings only.
#   Each mace has its own file
#   in the /maces/ folder.
# ==============================

animation:
  # How many ticks between each animation frame.
  # 1 tick = 50ms. Lower = faster shimmer. Default: 2 (10fps)
  update-interval: 2

messages:
  # Sent to the player when their soulbound mace returns after death
  soulbound-return: "&#1a1a6e✦ &#00e5ffYour soulbound mace has returned to you."
  # Sent when player tries to drop a soulbound mace
  cannot-drop: "&#1a1a6e✦ &#00e5ffThis mace is soulbound — it cannot leave your side."
  # Sent when a mace not bound to the player is found in their inventory on login
  wrong-player-removed: "&#FF6347✦ A soulbound mace not bound to you was removed."
  # Cooldown message — {ability} and {seconds} are replaced at runtime
  on-cooldown: "&#1a1a6e✦ &#00e5ff{ability} &#7f7f7fis on cooldown for &#ffffff{seconds}s&#7f7f7f."
  # Ability fired messages
  cold-aura-fired: "&#00e5ff❄ Cold Aura unleashed!"
  tidal-surge-fired: "&#1a1a6e🌊 Tidal Surge launched!"
