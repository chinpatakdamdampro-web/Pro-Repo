# ── Holder ──────────────────────────────────────────────────
# Enter the IGN of the player who owns this mace.
holder: "YourNameHere"

# ── Display ─────────────────────────────────────────────────
display-name: "ʜᴀᴍᴍᴇʀ ᴏꜰ ᴛʜᴇ ʟᴀʀᴘᴇʀꜱ"

# Gradient colors for the animated name shimmer
gradient-start: "#8B0000"
gradient-end: "#FF4444"

# ── Enchantments ────────────────────────────────────────────
enchantments:
  DENSITY: 5
  BREACH: 4
  WIND_BURST: 3

# ── Abilities ───────────────────────────────────────────────
abilities:
  larper_freeze:
    enabled: true
    # Cooldown in seconds — keep this high, this is a powerful ability
    cooldown: 120
    # Radius in blocks to affect nearby players
    radius: 14.0
    # Total freeze duration in seconds
    freeze-duration: 4
    # At what second each dialogue line appears (must be within freeze-duration)
    dialogue-line-1-delay: 0
    dialogue-line-2-delay: 2
    # The dialogue lines — {wielder} is replaced with the wielder's name at runtime
    dialogue-line-1: "«Most players would die here.»"
    dialogue-line-2: "«But you should know by now that I'm not most players.»"
    # Strength buff after freeze ends
    strength-level: 1
    strength-duration: 400  # in ticks — 400 = 20 seconds
    # Whether players currently taking damage are immune to the freeze
    combat-immunity: true
    # How long in ticks after taking damage a player is considered "in combat" (100 = 5 seconds)
    combat-immunity-window: 100
