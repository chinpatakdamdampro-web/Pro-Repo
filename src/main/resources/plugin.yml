name: HammerMaces
version: '${version}'
main: dev.hammermaces.HammerMacesPlugin
api-version: '1.21'
description: Soulbound animated maces for your SMP
authors: [ YourName ]
website: ''

commands:
  givemace:
    description: Give a player their soulbound mace
    usage: /givemace <player> <mace_id>
    permission: hammermaces.give
  macereload:
    description: Reload all mace configs
    usage: /macereload
    permission: hammermaces.reload

permissions:
  hammermaces.give:
    description: Allows giving soulbound maces
    default: op
  hammermaces.reload:
    description: Allows reloading mace configs
    default: op
  hammermaces.soulbound.bypass:
    description: Bypass soulbound restrictions (admins)
    default: op
