name: HammerMaces
version: '${version}'
main: dev.hammermaces.HammerMacesPlugin
api-version: '1.21'
description: Soulbound animated maces for your SMP
authors: [ YourName ]
depend: [ packetevents, ParticleNativeAPI ]
softdepend: [ PlaceholderAPI ]

commands:
  givemace:
    description: Give a player their soulbound mace
    usage: /givemace <player> <mace_id>
    permission: hammermaces.give
  macereload:
    description: Reload all mace configs
    usage: /macereload
    permission: hammermaces.reload

permissions:
  hammermaces.give:
    default: op
  hammermaces.reload:
    default: op
  hammermaces.soulbound.bypass:
    default: op
